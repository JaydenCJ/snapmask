<svg xmlns="http://www.w3.org/2000/svg" width="760" height="492" viewBox="0 0 760 492" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="492" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">snapmask — snapshots that ignore the noise, not the bugs</text>

  <text x="24" y="64" fill="#7ee787">$ snapmask snap run1.json run2.json --name orders</text>
  <text x="24" y="86" fill="#c9d1d9" xml:space="preserve"><tspan fill="#28c840">✓</tspan> orders → __snapmasks__/orders.snap.json (written)</text>
  <text x="24" y="106" fill="#c9d1d9" xml:space="preserve">  9 fields masked (5 shape · 4 variance), 4 rules learned from 2 runs</text>

  <text x="24" y="138" fill="#7ee787">$ snapmask mask run1.json --explain</text>
  <text x="24" y="160" fill="#c9d1d9" xml:space="preserve">masked 5 fields:</text>
  <text x="24" y="180" fill="#c9d1d9" xml:space="preserve">  /customer/id      <tspan fill="#d2a8ff">uuid</tspan>           shape     <tspan fill="#56d4dd">&lt;uuid:1&gt;</tspan></text>
  <text x="24" y="200" fill="#c9d1d9" xml:space="preserve">  /items/0/ownerId  <tspan fill="#d2a8ff">uuid</tspan>           shape     <tspan fill="#56d4dd">&lt;uuid:1&gt;</tspan></text>
  <text x="24" y="220" fill="#c9d1d9" xml:space="preserve">  /items/1/ownerId  <tspan fill="#d2a8ff">uuid</tspan>           shape     <tspan fill="#56d4dd">&lt;uuid:1&gt;</tspan></text>
  <text x="24" y="240" fill="#c9d1d9" xml:space="preserve">  /requestId        <tspan fill="#d2a8ff">uuid</tspan>           shape     <tspan fill="#56d4dd">&lt;uuid:2&gt;</tspan></text>
  <text x="24" y="260" fill="#c9d1d9" xml:space="preserve">  /servedAt         <tspan fill="#d2a8ff">timestamp-iso</tspan>  shape     <tspan fill="#56d4dd">&lt;timestamp-iso:1&gt;</tspan></text>
  <text x="24" y="280" fill="#8b949e" xml:space="preserve">candidates (shape is suggestive — confirm with `snapmask learn` before they mask):</text>
  <text x="24" y="300" fill="#8b949e" xml:space="preserve">  /etag  hex-digest</text>

  <text x="24" y="332" fill="#8b949e"># fresh run: new ids, new timestamp, new counter — still green</text>
  <text x="24" y="354" fill="#7ee787">$ snapmask check run3.json --name orders</text>
  <text x="24" y="376" fill="#c9d1d9" xml:space="preserve"><tspan fill="#28c840">✓</tspan> orders — matches snapshot, 9 fields masked (5 shape · 4 variance)</text>

  <text x="24" y="408" fill="#8b949e"># …but a real regression is not noise:</text>
  <text x="24" y="430" fill="#c9d1d9" xml:space="preserve"><tspan fill="#f85149">✗</tspan> orders — 2 differences after masking</text>
  <text x="24" y="450" fill="#d29922" xml:space="preserve">  ~ /items/0/qty: 2 → 3</text>
  <text x="24" y="470" fill="#d29922" xml:space="preserve">  ~ /total: 2980 → 4230</text>
</svg>
